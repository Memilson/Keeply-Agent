name: Build Installers

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: build-installers-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  AGENT_DIR: .
  LINUX_INSTALLER_PATH: keeply-all.bin
  WINDOWS_BUILD_DIR: build-win
  WINDOWS_DIST_DIR: dist/windows

jobs:
  linux-installer:
    name: Linux Installer (.bin)
    runs-on: ubuntu-24.04
    timeout-minutes: 25

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install build dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            libssl-dev \
            zlib1g-dev \
            libsqlite3-dev \
            libzstd-dev

      - name: Make keeply.sh executable
        run: |
          set -euxo pipefail
          chmod +x keeply.sh

      - name: Build Linux installer
        run: |
          set -euxo pipefail
          ./keeply.sh build-installer
          test -f "${LINUX_INSTALLER_PATH}"
          ls -lh "${LINUX_INSTALLER_PATH}"

      - name: Upload Linux installer artifact
        uses: actions/upload-artifact@v5
        with:
          name: keeply-linux-installer-${{ github.sha }}
          path: ${{ env.LINUX_INSTALLER_PATH }}
          if-no-files-found: error
          retention-days: 14
          compression-level: 0
