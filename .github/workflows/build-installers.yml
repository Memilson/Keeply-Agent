name: Build Installers

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: build-installers-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  AGENT_DIR: Agente
  LINUX_INSTALLER_PATH: Agente/keeply-all.bin
  WINDOWS_BUILD_DIR: Agente/build-win
  WINDOWS_DIST_DIR: dist/windows

jobs:
  linux-installer:
    name: Linux Installer (.bin)
    runs-on: ubuntu-24.04
    timeout-minutes: 25

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install build dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            libssl-dev \
            zlib1g-dev \
            libsqlite3-dev \
            libzstd-dev

      - name: Make keeply.sh executable
        run: |
          set -euxo pipefail
          chmod +x "${AGENT_DIR}/keeply.sh"

      - name: Build Linux installer
        run: |
          set -euxo pipefail
          "./${AGENT_DIR}/keeply.sh" build-installer
          test -f "${LINUX_INSTALLER_PATH}"
          ls -lh "${LINUX_INSTALLER_PATH}"

      - name: Upload Linux installer artifact
        uses: actions/upload-artifact@v6
        with:
          name: keeply-linux-installer-${{ github.sha }}
          path: ${{ env.LINUX_INSTALLER_PATH }}
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

  windows-binaries:
    name: Windows Binaries (.exe)
    runs-on: windows-2022
    timeout-minutes: 30

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          cache: true
          install: >-
            base-devel
            git
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-zlib
            mingw-w64-x86_64-sqlite3
            mingw-w64-x86_64-zstd

      - name: Configure CMake
        run: |
          set -euxo pipefail
          cmake -S "${AGENT_DIR}" -B "${WINDOWS_BUILD_DIR}" -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build Windows executables
        run: |
          set -euxo pipefail
          cmake --build "${WINDOWS_BUILD_DIR}" --target keeply_agent keeply_cbt_daemon --parallel
          test -f "${WINDOWS_BUILD_DIR}/keeply_agent.exe"
          test -f "${WINDOWS_BUILD_DIR}/keeply_cbt_daemon.exe"

      - name: Prepare Windows package
        run: |
          set -euxo pipefail
          mkdir -p "${WINDOWS_DIST_DIR}"
          cp "${WINDOWS_BUILD_DIR}/keeply_agent.exe" "${WINDOWS_DIST_DIR}/"
          cp "${WINDOWS_BUILD_DIR}/keeply_cbt_daemon.exe" "${WINDOWS_DIST_DIR}/"

          cat > "${WINDOWS_DIST_DIR}/install-keeply.ps1" <<'EOF'
          param(
            [string]$InstallDir = "$env:ProgramFiles\Keeply"
          )

          $BinDir = Join-Path $InstallDir "bin"
          New-Item -ItemType Directory -Force -Path $BinDir | Out-Null

          Copy-Item "$PSScriptRoot\keeply_agent.exe" (Join-Path $BinDir "keeply_agent.exe") -Force
          Copy-Item "$PSScriptRoot\keeply_cbt_daemon.exe" (Join-Path $BinDir "keeply_cbt_daemon.exe") -Force

          Write-Host "Arquivos instalados em $BinDir"
          Write-Host "Crie o servico com:"
          Write-Host "  keeply_cbt_daemon.exe --install-service --root C:\"
          EOF

          ls -la "${WINDOWS_DIST_DIR}"

      - name: Upload Windows package artifact
        uses: actions/upload-artifact@v6
        with:
          name: keeply-windows-binaries-${{ github.sha }}
          path: ${{ env.WINDOWS_DIST_DIR }}
          if-no-files-found: error
          retention-days: 14
